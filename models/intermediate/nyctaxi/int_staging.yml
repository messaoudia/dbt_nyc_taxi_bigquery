version: 2

models:
  - name: int_staging__yellow_tripdata_details
    description: "{{ doc('int_staging__yellow_tripdata_details') }}"
    columns:
      - name: vendor_id
        description: "{{ doc('col_vendor_id') }}"
      - name: pickup_ts
        description: "{{ doc('col_pickup_ts') }}"
      - name: dropoff_ts
        description: "{{ doc('col_dropoff_ts') }}"
      - name: passenger_count
        description: "{{ doc('col_passenger_count') }}"
      - name: trip_distance
        description: "{{ doc('col_trip_distance') }}"
      - name: fk_rate_code_id
        description: "{{ doc('col_fk_rate_code_id') }}"
      - name: store_and_fwd_flag
        description: "{{ doc('col_store_and_fwd_flag') }}"
      - name: fk_pickup_location_id
        description: "{{ doc('col_fk_pickup_location_id') }}"
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_nyctaxi_raw__taxi_zone_lookup')
                field: location_id
      - name: fk_dropoff_location_id
        description: "{{ doc('col_fk_dropoff_location_id') }}"
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_nyctaxi_raw__taxi_zone_lookup')
                field: location_id
      - name: payment_type
        description: "{{ doc('col_payment_type') }}"
      - name: fare_amount
        description: "{{ doc('col_fare_amount') }}"
      - name: extra
        description: "{{ doc('col_extra') }}"
      - name: mta_tax
        description: "{{ doc('col_mta_tax') }}"
      - name: tip_amount
        description: "{{ doc('col_tip_amount') }}"
      - name: tolls_amount
        description: "{{ doc('col_tolls_amount') }}"
      - name: improvement_surcharge
        description: "{{ doc('col_improvement_surcharge') }}"
      - name: congestion_surcharge
        description: "{{ doc('col_congestion_surcharge') }}"
      - name: total_amount
        description: "{{ doc('col_total_amount') }}"
      - name: airport_fee
        description: "{{ doc('col_airport_fee') }}"
      - name: cbd_congestion_fee
        description: "{{ doc('col_cbd_congestion_fee') }}"
      - name: pickup_state_id
        description: "{{ doc('col_pickup_state_id') }}"
      - name: pickup_state_name
        description: "{{ doc('col_pickup_state_name') }}"
        data_tests:
          - is_nyc_location_only
      - name: pickup_region
        description: "{{ doc('col_pickup_region') }}"
      - name: pickup_district
        description: "{{ doc('col_pickup_district') }}"
      - name: pickup_zone
        description: "{{ doc('col_pickup_zone') }}"
      - name: pickup_service_zone
        description: "{{ doc('col_pickup_service_zone') }}"
      - name: dropoff_state_id
        description: "{{ doc('col_dropoff_state_id') }}"
      - name: dropoff_state_name
        description: "{{ doc('col_dropoff_state_name') }}"
        data_tests:
          - is_nyc_location_only
      - name: dropoff_region
        description: "{{ doc('col_dropoff_region') }}"
      - name: dropoff_district
        description: "{{ doc('col_dropoff_district') }}"
      - name: dropoff_zone
        description: "{{ doc('col_dropoff_zone') }}"
      - name: dropoff_service_zone
        description: "{{ doc('col_dropoff_service_zone') }}"
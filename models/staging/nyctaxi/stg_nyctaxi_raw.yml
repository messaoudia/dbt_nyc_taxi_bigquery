      - name: tolls_amount
        description: "Total tolls paid during the trip."
      - name: improvement_surcharge
        description: "Surcharge funding taxi accessibility improvements. Fixed at $0.30 since 2015."
      - name: congestion_surcharge
        description: "New York State congestion surcharge applied to trips in the congestion zone."
      - name: total_amount
